name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate NovaDrive mock data
        run: uv run python generate_novadrive_data.py

      - name: Load data into DuckDB
        run: uv run python create_novadrive_db.py

      - name: Run tests
        run: uv run pytest tests/ -v
